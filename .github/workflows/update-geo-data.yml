# GitHub Actions workflow to update geo database weekly
name: Update Geo Database

on:
  schedule:
    # Run every Monday at 2 AM UTC
    - cron: "0 2 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  update-geo-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download geo database
        run: |
          curl -L ${{ secrets.GEO_DATA_URL }} -o geo.zip
          ls -la geo.zip
          echo "Downloaded file size: $(du -h geo.zip)"

      - name: Extract geo database
        run: python3 deploy-scripts/extract-bin.py geo.zip geo.bin

      - name: Install COS SDK
        run: pip3 install cos-python-sdk-v5

      - name: Upload to Tencent Cloud COS
        run: |
          python3 << 'EOF'
          import os
          import sys
          from qcloud_cos import CosConfig, CosS3Client
          import logging

          # Set logging level to suppress verbose output
          logging.basicConfig(level=logging.WARNING)

          # Get environment variables
          secret_id = os.environ.get('GEO_COS_SECRET_ID')
          secret_key = os.environ.get('GEO_COS_SECRET_KEY')
          region = os.environ.get('GEO_COS_REGION', 'ap-hongkong')
          bucket = os.environ.get('GEO_COS_BUCKET')
          file_key = os.environ.get('GEO_COS_FILE_KEY', 'Country.mmdb')

          if not secret_id or not secret_key or not bucket:
              print("Error: Missing required environment variables GEO_COS_SECRET_ID, GEO_COS_SECRET_KEY, or GEO_COS_BUCKET")
              sys.exit(1)

          try:
              # Initialize COS configuration
              config = CosConfig(
                  Region=region,
                  SecretId=secret_id,
                  SecretKey=secret_key
              )

              # Initialize COS client
              client = CosS3Client(config)

              # Upload file
              response = client.upload_file(
                  Bucket=bucket,
                  Key=file_key,
                  LocalFilePath='./Country.mmdb',
                  EnableMD5=False  # Skip MD5 calculation to save time
              )

              print(f"Successfully uploaded {file_key} to COS:")
              print(f"Bucket: {bucket}")
              print(f"Key: {file_key}")
              print(f"Region: {region}\n")

          except Exception as e:
              print(f"Error uploading to COS: {str(e)}")
              raise
          EOF
        env:
          GEO_COS_SECRET_ID: ${{ secrets.GEO_COS_SECRET_ID }}
          GEO_COS_SECRET_KEY: ${{ secrets.GEO_COS_SECRET_KEY }}
          GEO_COS_REGION: ${{ vars.GEO_COS_REGION }}
          GEO_COS_BUCKET: ${{ vars.GEO_COS_BUCKET }}
          GEO_COS_FILE_KEY: ${{ vars.GEO_COS_FILE_KEY }}

      - name: Cleanup
        if: always()
        run: |
          rm -f Country.mmdb.gz Country.mmdb
